<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Polished Theory Question Checklists</title>
  <script>
    const savedTheme = localStorage.getItem("rfa-theme");
    const systemTheme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
    document.documentElement.dataset.theme = savedTheme === "dark" || savedTheme === "light" ? savedTheme : systemTheme;
  </script>
  <link rel="stylesheet" href="assets/site.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <p class="brand__eyebrow">RFA oral exam</p>
      <h1 class="brand__title">Polished theory checklists</h1>
    </div>
    <div class="switcher" role="group" aria-label="Checklist switcher">
      <button type="button" id="measureButton" aria-pressed="true">Real Analysis</button>
      <button type="button" id="functionalButton" aria-pressed="false">Functional Analysis</button>
    </div>
    <div class="priority-filter topbar-filter" role="group" aria-label="Question filters">
      <button type="button" data-priority="all" aria-pressed="true">All</button>
      <button type="button" data-priority="★★★" aria-pressed="false">3 stars</button>
      <button type="button" data-priority="★★" aria-pressed="false">2 stars</button>
      <button type="button" data-priority="★" aria-pressed="false">1 star</button>
      <button type="button" data-proof="all" aria-pressed="true">Any type</button>
      <button type="button" data-proof="true" aria-pressed="false">Proofs</button>
    </div>
    <div class="theme-switcher" role="group" aria-label="Theme">
      <button type="button" data-theme-choice="light" aria-pressed="false">Light</button>
      <button type="button" data-theme-choice="dark" aria-pressed="false">Dark</button>
    </div>
  </header>

  <iframe
    id="measureFrame"
    class="checklist-frame"
    title="Real analysis theory checklist"
    src="polished_measure_theory_questions.html?embedded=1">
  </iframe>
  <iframe
    id="functionalFrame"
    class="checklist-frame"
    title="Functional analysis theory checklist"
    src="polished_functional_theory_questions.html?embedded=1"
    hidden>
  </iframe>

  <script>
    (function () {
      const checklistFrames = {
        measure: document.getElementById("measureFrame"),
        functional: document.getElementById("functionalFrame")
      };
      const measureButton = document.getElementById("measureButton");
      const functionalButton = document.getElementById("functionalButton");

      function selectedChecklist() {
        const params = new URLSearchParams(window.location.search);
        const topic = params.get("topic") || window.location.hash.slice(1);
        return topic === "functional" ? "functional" : "measure";
      }

      function showChecklist(kind, updateUrl = true) {
        const isMeasure = kind === "measure";
        checklistFrames.measure.hidden = !isMeasure;
        checklistFrames.functional.hidden = isMeasure;
        measureButton.setAttribute("aria-pressed", String(isMeasure));
        functionalButton.setAttribute("aria-pressed", String(!isMeasure));

        if (updateUrl) {
          const url = new URL(window.location.href);
          url.searchParams.set("topic", isMeasure ? "measure" : "functional");
          url.hash = "";
          window.history.replaceState(null, "", url);
        }
      }

      measureButton.addEventListener("click", () => showChecklist("measure"));
      functionalButton.addEventListener("click", () => showChecklist("functional"));
      showChecklist(selectedChecklist(), false);
    })();
  </script>
  <script src="assets/site.js"></script>
</body>
</html>
